version: "3.9"
services:
  managerx:
    build: .
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:stable-alpine
    depends_on:
      - managerx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"

  certbot:
    image: certbot/certbot
    depends_on:
      - nginx
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    entrypoint: ""
    command: ["certonly", "--webroot", "--webroot-path=/var/www/certbot", "--email", "your-email@example.com", "--agree-tos", "--no-eff-email", "-d", "tanishq1-is.a.dev"]

volumes:
  certbot-etc:
  certbot-var:
